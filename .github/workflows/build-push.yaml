name: Build and Push Crew Image

on:
  push:
    branches: [main]
    paths: [crew/**]

env:
  AWS_REGION: us-west-2
  ECR_REPO: crew-dev-agents/crew

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        working-directory: crew
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}"
          docker build --platform linux/amd64 -t "${IMAGE}:${GITHUB_SHA::8}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA::8}"
          docker push "${IMAGE}:latest"
