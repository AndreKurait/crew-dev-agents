apiVersion: s3.services.k8s.aws/v1alpha1
kind: Bucket
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: crew-dev-agents-artifacts
  namespace: crewai
spec:
  name: crew-dev-agents-artifacts
  versioningConfiguration:
    status: Enabled
  encryption:
    rules:
      - applyServerSideEncryptionByDefault:
          sseAlgorithm: AES256
  tags:
    - key: Project
      value: crew-dev-agents
    - key: ManagedBy
      value: ack
