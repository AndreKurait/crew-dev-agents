apiVersion: secretsmanager.services.k8s.aws/v1alpha1
kind: Secret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: crew-dev-agents-github-token
  namespace: crewai
spec:
  name: crew-dev-agents/github-token
  description: "GitHub PAT for CrewAI agents to interact with target repos"
  # Value must be set manually after creation:
  #   aws secretsmanager put-secret-value \
  #     --secret-id crew-dev-agents/github-token \
  #     --secret-string '{"GITHUB_TOKEN":"ghp_xxx"}'
  tags:
    - key: Project
      value: crew-dev-agents
