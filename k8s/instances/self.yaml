# Point the crew at its own repo for self-improvement
apiVersion: kro.run/v1alpha1
kind: CrewAIStack
metadata:
  name: self
  namespace: crewai
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: self
  repoUrl: https://github.com/AndreKurait/crew-dev-agents
  schedule: "0 */6 * * *"
  bedrockModel: "bedrock/anthropic.claude-opus-4-6-v1:0"
  bedrockRegion: "us-west-2"
  crewImage: "<ACCOUNT_ID>.dkr.ecr.us-west-2.amazonaws.com/crew-dev-agents/crew:latest"
  githubSecretName: "crew-dev-agents/github-token"
