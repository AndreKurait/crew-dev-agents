apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crew-dev-agents
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AndreKurait/crew-dev-agents.git
    targetRevision: main
    path: k8s
    directory:
      recurse: true
      exclude: "{argocd/*,instances-manual/*}"
  destination:
    # For EKS managed ArgoCD, use the cluster ARN (not https://kubernetes.default.svc)
    server: <CLUSTER_ARN>
    namespace: crewai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
