triage_issues:
  description: >
    Fetch open issues from the target repo that lack labels or assignees.
    For each issue: analyze content, assign appropriate labels (bug, feature,
    question, good-first-issue, etc.), set priority, and add a triage comment
    summarizing the assessment.
  expected_output: >
    JSON list of triaged issues with: issue_number, title, assigned_labels,
    priority (P0-P3), triage_comment, and duplicate_of (if applicable).
  agent: triager

review_prs:
  description: >
    Fetch open PRs awaiting review. For each PR: read the full diff and
    related files, check for bugs, security issues, and style violations.
    Post a review with inline comments and an overall assessment.
  expected_output: >
    JSON list of reviewed PRs with: pr_number, verdict (approve/request_changes),
    comments list with file/line/message, and summary.
  agent: reviewer

implement_fix:
  description: >
    Pick the highest-priority triaged issue that is labeled as a bug.
    Read the relevant code, implement a fix, and create a PR with a clear
    description linking to the issue.
  expected_output: >
    JSON with: issue_number, pr_number, files_changed, description, and
    branch_name.
  agent: coder

evaluate_and_evolve:
  description: >
    Read performance metrics from S3 (triage accuracy, PR acceptance rate,
    review quality). Analyze trends over the last 5 runs. If any metric
    is below threshold, propose specific changes to agents.yaml or tasks.yaml
    and create a PR on the agent platform repo.
  expected_output: >
    JSON with: metrics_summary, below_threshold (list), proposed_changes
    (list of {file, change_description, new_content}), and evolution_pr_url
    (if created).
  agent: evolver
